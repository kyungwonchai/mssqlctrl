<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MSSQLCtrl · DB Controller{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="app-body bg-deep">
    <div class="container-fluid app-shell">
        <nav class="app-nav" aria-label="주요 화면">
            <a href="{{ url_for('index') }}" class="app-nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                <span class="app-nav-label">연결 · 추출</span>
                <span class="app-nav-desc">인스턴스 등록·스키마 추출</span>
            </a>
            <a href="{{ url_for('agent_page') }}" class="app-nav-link {% if request.endpoint == 'agent_page' %}active{% endif %}">
                <span class="app-nav-label">에이전틱 진단</span>
                <span class="app-nav-desc">Ollama·LLM 분석 리포트</span>
            </a>
        </nav>
        {% block content %}{% endblock %}
    </div>

    {% block modals %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block page_scripts %}{% endblock %}
</body>
</html>
