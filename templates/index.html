<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise DB Controller</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-deep">
    <div class="container-fluid">
        <header class="header-section">
            <h1>Database Controller</h1>
            <button class="btn btn-premium" onclick="startBatchExport()">Run Parallel Extraction</button>
        </header>

        <div class="row g-4">
            <!-- Left Panel: Connection Management -->
            <div class="col-xl-3 col-lg-4">
                <div class="glass-card p-4 h-100">
                    <h4 class="mb-4">New Instance</h4>
                    <form action="{{ url_for('add_connection') }}" method="POST">
                        <select name="db_type" class="form-select mb-3">
                            <option value="mssql">MS SQL Server (2014-2019)</option>
                            <option value="mysql">MySQL 5.7 / 8.0</option>
                        </select>
                        <input type="text" name="name" placeholder="Friendly Name" class="form-control mb-3" required>
                        <input type="text" name="host" placeholder="Host Address" class="form-control mb-3" required>
                        <input type="number" name="port" placeholder="Port" class="form-control mb-3" value="1433">
                        <input type="text" name="user" placeholder="Username" class="form-control mb-3" required>
                        <input type="password" name="password" placeholder="Password" class="form-control mb-4" required>
                        <button type="submit" class="btn btn-primary w-100 py-2">Add Connection</button>
                    </form>
                </div>
            </div>

            <!-- Middle Panel: Active Connections -->
            <div class="col-xl-6 col-lg-8">
                <div class="glass-card p-0 overflow-hidden h-100">
                    <div class="p-4 border-bottom border-secondary d-flex justify-content-between align-items-center">
                        <h4 class="m-0">Infrastructure</h4>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="selectAll">
                            <label class="form-check-label text-secondary" for="selectAll">Select All</label>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th width="40"></th>
                                    <th>Type</th>
                                    <th>Name</th>
                                    <th>Address</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for c in connections %}
                                <tr>
                                    <td><input type="checkbox" class="conn-check" data-id="{{ c.id }}"></td>
                                    <td><span class="badge {{ 'bg-primary' if c.db_type == 'mssql' else 'bg-warning text-dark' }}">{{ c.db_type.upper() }}</span></td>
                                    <td><strong>{{ c.name }}</strong></td>
                                    <td class="text-secondary">{{ c.host }}:{{ c.port }}</td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-light" onclick="openDbModal({{ c.id }}, '{{ c.name }}')">Configure DBs</button>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Live Status Monitor -->
            <div class="col-xl-3 col-lg-12">
                <div class="glass-card p-4 h-100">
                    <h4 class="mb-4">Extraction Monitor</h4>
                    <div id="taskContainer" class="list-group list-group-flush bg-transparent">
                        <!-- Tasks will load here via AJAX -->
                        <div class="text-center text-secondary py-5">No active tasks</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- DB Selection Modal -->
    <div class="modal fade" id="dbModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card bg-card border-secondary">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" id="modalTitle">Select Databases</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="dbList">
            <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
          </div>
          <div class="modal-footer border-secondary">
            <button type="button" class="btn btn-primary w-100" onclick="confirmDbSelection()">Confirm & Save</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentConnId = null;
        let dbSelections = {};
        const dbModal = new bootstrap.Modal(document.getElementById('dbModal'));

        async function openDbModal(id, name) {
            currentConnId = id;
            document.getElementById('modalTitle').innerText = name;
            dbModal.show();
            const res = await fetch(`/get_databases/${id}`);
            const data = await res.json();
            if(data.success) {
                let html = '<div class="list-group">';
                data.databases.forEach(db => {
                    const checked = (dbSelections[id] || []).includes(db) ? 'checked' : '';
                    html += `<label class="list-group-item bg-transparent text-light border-secondary"><input class="form-check-input me-3 db-check" type="checkbox" value="${db}" ${checked}>${db}</label>`;
                });
                document.getElementById('dbList').innerHTML = html + '</div>';
            }
        }

        function confirmDbSelection() {
            dbSelections[currentConnId] = Array.from(document.querySelectorAll('.db-check:checked')).map(c => c.value);
            dbModal.hide();
        }

        async function startBatchExport() {
            const checks = document.querySelectorAll('.conn-check:checked');
            if (!checks.length) return alert('No connections selected.');
            const selections = Array.from(checks).map(c => ({ conn_id: parseInt(c.dataset.id), databases: dbSelections[c.dataset.id] || [] }));
            await fetch('/batch_export', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ selections }) });
            refreshTasks();
        }

        async function refreshTasks() {
            const res = await fetch('/tasks');
            const tasks = await res.json();
            const container = document.getElementById('taskContainer');
            if (tasks.length === 0) return;
            
            container.innerHTML = tasks.map(t => `
                <div class="mb-4 border-bottom border-secondary pb-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <small class="text-secondary">${t.created_at}</small>
                        <span class="status-badge status-${t.status.toLowerCase()}">${t.status}</span>
                    </div>
                    <div class="fw-bold mb-2" style="font-size: 0.9rem">${t.conn_name}</div>
                    <div class="progress mb-1"><div class="progress-bar" style="width: ${t.progress}%"></div></div>
                    <div class="d-flex justify-content-between"><small class="text-secondary">${t.progress}%</small></div>
                    ${t.message ? `<div class="text-danger mt-1 small">${t.message}</div>` : ''}
                </div>
            `).join('');
        }

        setInterval(refreshTasks, 2000);
        document.getElementById('selectAll').onclick = (e) => document.querySelectorAll('.conn-check').forEach(c => c.checked = e.target.checked);
        refreshTasks();
    </script>
</body>
</html>
